<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <link href="https://fonts.cdnfonts.com/css/cursed-timer-ulil" rel="stylesheet">
    </head>
    <body>
        <div class="container">
            <div class="item-1 item">
                <h3>HOME</h3>
                <div class="score-box-1 score-box">
                    <p id="home-score"></p>
                </div>
                <div class="btn-container">
                    <button class="btn" id="home-btn-1" onclick="home1()">+1</button>
                    <button class="btn" id="home-btn-2" onclick="home2()">+2</button>
                    <button class="btn" id="home-btn-3" onclick="home3()">+3</button>
                </div>
            </div>
            <div class="item-2 item">
                <h3>GUEST</h3>
                <div class="score-box-2 score-box">
                    <p id="guest-score"></p>
                </div>
                <div class="btn-container">
                    <button class="btn" id="guest-btn-1" onclick="guest1()">+1</button>
                    <button class="btn" id="guest-btn-2" onclick="guest2()">+2</button>
                    <button class="btn" id="guest-btn-3" onclick="guest3()">+3</button>
                </div>
            </div>
        </div>
        
        <div class="newgame-container">
            <button onclick="newGame()">New Game</button>
        </div>
        <script src="index.js"></script>
    </body>
</html>
